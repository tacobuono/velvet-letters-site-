<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Velvet Letters Post Office</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@200;300;400;500;600;700&family=DM+Mono:wght@300;400&family=Caveat:wght@400;700&family=Fraunces:ital,wght@0,300;0,700;0,900;1,300&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:#0a0515;color:#f5efe6;cursor:none}
#mainCanvas{position:fixed;inset:0;z-index:0}
.noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
/* Cursor */
#cur{position:fixed;width:24px;height:24px;border:1.5px solid rgba(201,168,76,.6);border-radius:50%;pointer-events:none;z-index:999;transform:translate(-50%,-50%);transition:width .15s,height .15s,background .15s}
#cur.hover{width:40px;height:40px;background:rgba(201,168,76,.08);border-color:#c9a84c}
#curDot{position:fixed;width:4px;height:4px;background:#c9a84c;border-radius:50%;pointer-events:none;z-index:999;transform:translate(-50%,-50%)}

/* UI Layer */
.ui{position:fixed;z-index:100;pointer-events:none}
.ui-top{top:1.5rem;left:2rem;right:2rem;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;color:#c9a84c;letter-spacing:.15em;text-transform:uppercase}
.logo-sub{font-size:.5rem;letter-spacing:.4em;color:rgba(245,239,230,.3);margin-top:.15rem}
.score-panel{text-align:right}
.score-label{font-family:'DM Mono',monospace;font-size:.45rem;letter-spacing:.3em;color:rgba(201,168,76,.3);text-transform:uppercase}
.score-val{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:900;color:#c9a84c;line-height:1}

/* Stamp counter */
.stamp-counter{position:fixed;bottom:2rem;left:2rem;z-index:100;pointer-events:none}
.stamp-counter .sc-label{font-size:.45rem;letter-spacing:.3em;color:rgba(201,168,76,.25);text-transform:uppercase;font-family:'DM Mono',monospace}
.stamp-counter .stamps{display:flex;gap:.3rem;margin-top:.3rem}
.stamp-counter .stamp{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(201,168,76,.15);transition:all .3s;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.5rem;color:transparent}
.stamp-counter .stamp.collected{border-color:#c9a84c;background:rgba(201,168,76,.15);color:#c9a84c}

/* Messages */
.msg{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:200;font-family:'Caveat',cursive;font-size:1.2rem;color:#c9a84c;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center;white-space:nowrap}
.msg.show{opacity:1}

/* Letter popup */
.letter-popup{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(10,5,21,.85);backdrop-filter:blur(15px);opacity:0;pointer-events:none;transition:opacity .4s}
.letter-popup.show{opacity:1;pointer-events:auto}
.letter-card{background:linear-gradient(160deg,#f5efe6,#e8dcc8);color:#2a1a10;max-width:380px;width:90%;padding:2.5rem;border-radius:2px;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5);transform:scale(.8) rotateX(10deg);transition:transform .5s cubic-bezier(.34,1.56,.64,1);cursor:none}
.letter-popup.show .letter-card{transform:scale(1) rotateX(0)}
.letter-card .seal{position:absolute;top:-18px;left:50%;transform:translateX(-50%);width:36px;height:36px;background:radial-gradient(circle at 40% 40%,#c0392b,#7a1515);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(122,21,21,.3)}
.letter-card .seal span{font-family:'Playfair Display',serif;font-size:.7rem;font-weight:900;color:rgba(255,255,255,.8)}
.letter-card h3{font-family:'Playfair Display',serif;font-size:1.3rem;margin-top:.5rem;margin-bottom:.8rem;color:#2a1a10}
.letter-card p{font-family:'Caveat',cursive;font-size:1rem;line-height:1.7;color:#5a4a3a}
.letter-card .close-btn{position:absolute;top:.8rem;right:1rem;font-size:1.2rem;color:#8a7a6a;cursor:pointer;pointer-events:auto;background:none;border:none;font-family:'Outfit';transition:color .2s}
.letter-card .close-btn:hover{color:#2a1a10}

/* Instructions */
.instructions{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);z-index:100;text-align:center;pointer-events:none;opacity:0;animation:fadeInI 1s ease forwards 1.5s}
.instructions p{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.2em;color:rgba(201,168,76,.25);margin-bottom:.3rem}
@keyframes fadeInI{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Combo popup */
.combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:250;font-family:'Fraunces',serif;font-size:3rem;font-weight:900;color:#c9a84c;opacity:0;pointer-events:none;text-shadow:0 0 30px rgba(201,168,76,.3)}
.combo.pop{animation:comboPop .8s ease forwards}
@keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-60%) scale(1)}}
</style>
</head>
<body>
<canvas id="mainCanvas"></canvas>
<div class="noise"></div>
<div id="cur"></div><div id="curDot"></div>

<div class="ui ui-top">
  <div><div class="logo">The Post Office</div><div class="logo-sub">Velvet Letters</div></div>
  <div class="score-panel"><div class="score-label">Letters Opened</div><div class="score-val" id="score">0</div></div>
</div>

<div class="stamp-counter">
  <div class="sc-label">Secret Stamps</div>
  <div class="stamps" id="stamps"></div>
</div>

<div class="msg" id="msg"></div>
<div class="combo" id="combo"></div>

<div class="instructions" id="instr">
  <p>Click floating envelopes to open them</p>
  <p>Find 7 hidden stamps in the scene</p>
  <p>Move your mouse to explore</p>
</div>

<div class="letter-popup" id="letterPopup">
  <div class="letter-card" id="letterCard">
    <div class="seal"><span>VL</span></div>
    <button class="close-btn" id="closeBtn">✕</button>
    <h3 id="letterTitle">Welcome</h3>
    <p id="letterBody">Every great brand starts with a letter.</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============ STATE ============
let score = 0, stamps = 0;
const TOTAL_STAMPS = 7;
const stampEl = document.getElementById('stamps');
for(let i=0;i<TOTAL_STAMPS;i++){const s=document.createElement('div');s.className='stamp';s.textContent='V';stampEl.appendChild(s);}

const letters = [
  {t:"Welcome to the Post Office", b:"Every brand has a story waiting to be sealed, stamped, and sent into the world. You just found ours. Keep clicking."},
  {t:"Did You Know?", b:"The wax seal dates back to the Middle Ages. Kings used them to prove a letter hadn't been tampered with. We use them because they look incredible."},
  {t:"A Secret", b:"We once redesigned an entire brand identity during a thunderstorm. The power went out twice. The result? Our best work ever. Constraints breed creativity."},
  {t:"Dear Future Client", b:"If you're reading this, you're exactly the kind of curious person we love working with. The ones who click things just to see what happens."},
  {t:"Fun Fact #47", b:"The average person receives 121 emails per day. Only 2 or 3 actually get read. We make sure yours is one of them."},
  {t:"Philosophy", b:"We don't believe in loud marketing. We believe in the kind of message that makes someone stop scrolling, lean in, and actually read every word. Like this one."},
  {t:"The Golden Rule", b:"If a design doesn't make you feel something in the first 3 seconds, it's not a design. It's furniture. We build experiences, not furniture."},
  {t:"Hidden Message", b:"You've found more letters than most people. That tells us something about you: you're thorough, curious, and slightly obsessive. Those are compliments."},
  {t:"Almost There", b:"The best brands aren't built by committees. They're built by people who trust their instincts, take the weird route, and refuse to settle for ordinary."},
  {t:"The Last Letter", b:"Not really the last one. There are always more letters. That's the point. The conversation never ends. It just gets more interesting. velvetletters.com"},
];

function showMsg(text){const m=document.getElementById('msg');m.textContent=text;m.classList.add('show');setTimeout(()=>m.classList.remove('show'),2500);}
function showCombo(text){const c=document.getElementById('combo');c.textContent=text;c.className='combo pop';setTimeout(()=>c.className='combo',900);}
function collectStamp(){if(stamps<TOTAL_STAMPS){stampEl.children[stamps].classList.add('collected');stamps++;showMsg(stamps===TOTAL_STAMPS?'All stamps collected! You found every secret.':['Nice find!','Hidden stamp!','Eagle eye!','Keep looking...','Almost there...','So close!'][stamps-1]);if(stamps===TOTAL_STAMPS){showCombo('✦ COMPLETE ✦');try{window.parent.postMessage({type:'VELVET_LETTERS_POST_OFFICE_COMPLETE',stamps:stamps,letters:score},'*');}catch(e){}}}}
function openLetter(idx){const l=letters[idx%letters.length];document.getElementById('letterTitle').textContent=l.t;document.getElementById('letterBody').textContent=l.b;document.getElementById('letterPopup').classList.add('show');score++;document.getElementById('score').textContent=score;if(score%3===0)showCombo(score+' Letters!');}
document.getElementById('closeBtn').addEventListener('click',()=>document.getElementById('letterPopup').classList.remove('show'));
document.getElementById('letterPopup').addEventListener('click',e=>{if(e.target===document.getElementById('letterPopup'))document.getElementById('letterPopup').classList.remove('show');});

// ============ THREE.JS SCENE ============
const canvas = document.getElementById('mainCanvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x0a0515);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0515, 0.025);
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 8);

// Lights
scene.add(new THREE.AmbientLight(0x1a0a2e, 0.6));
const mainLight = new THREE.DirectionalLight(0xffeedd, 0.7);
mainLight.position.set(3, 6, 4);mainLight.castShadow=true;scene.add(mainLight);
const goldLight = new THREE.PointLight(0xc9a84c, 0.8, 15);
goldLight.position.set(-2, 4, 2);scene.add(goldLight);
const velvetLight = new THREE.PointLight(0x5c1a4a, 0.5, 12);
velvetLight.position.set(3, 1, -2);scene.add(velvetLight);
const warmLight = new THREE.PointLight(0xff8844, 0.3, 10);
warmLight.position.set(0, 3, 0);scene.add(warmLight);

// Materials
const envMat = new THREE.MeshStandardMaterial({color:0xf5efe6,roughness:.55,metalness:.05});
const sealMat = new THREE.MeshStandardMaterial({color:0x8b1a1a,roughness:.3,metalness:.4});
const goldMat = new THREE.MeshStandardMaterial({color:0xc9a84c,roughness:.2,metalness:.8});
const velvetMat = new THREE.MeshStandardMaterial({color:0x3a0a2e,roughness:.8,metalness:.05});
const darkMat = new THREE.MeshStandardMaterial({color:0x1a0a10,roughness:.7,metalness:.1});
const stampMat = new THREE.MeshStandardMaterial({color:0xc9a84c,roughness:.2,metalness:.9,emissive:0xc9a84c,emissiveIntensity:.1});

// Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(30,30), new THREE.MeshStandardMaterial({color:0x0d0518,roughness:.95}));
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);

// ============ CREATE ENVELOPE ============
function makeEnvelope(scale=1){
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.4*scale,.04*scale,.95*scale),envMat);
  g.add(body);
  // Sides
  const sm = new THREE.MeshStandardMaterial({color:0xe0d4be,roughness:.6,metalness:.05});
  const f=new THREE.Mesh(new THREE.BoxGeometry(1.4*scale,.4*scale,.015*scale),sm);f.position.set(0,.2*scale,.475*scale);g.add(f);
  const b=new THREE.Mesh(new THREE.BoxGeometry(1.4*scale,.4*scale,.015*scale),sm);b.position.set(0,.2*scale,-.475*scale);g.add(b);
  const l=new THREE.Mesh(new THREE.BoxGeometry(.015*scale,.4*scale,.95*scale),sm);l.position.set(-.7*scale,.2*scale,0);g.add(l);
  const r=new THREE.Mesh(new THREE.BoxGeometry(.015*scale,.4*scale,.95*scale),sm);r.position.set(.7*scale,.2*scale,0);g.add(r);
  // Flap
  const shape=new THREE.Shape();shape.moveTo(-.7*scale,0);shape.lineTo(0,.5*scale);shape.lineTo(.7*scale,0);shape.closePath();
  const flap=new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:.012*scale,bevelEnabled:false}),new THREE.MeshStandardMaterial({color:0xddd0b8,roughness:.55,metalness:.08}));
  flap.rotation.x=-Math.PI/2;flap.position.set(0,.4*scale,.47*scale);g.add(flap);
  // Seal
  const seal=new THREE.Mesh(new THREE.CylinderGeometry(.1*scale,.1*scale,.03*scale,24),sealMat);
  seal.position.set(0,.42*scale,.15*scale);g.add(seal);
  // Letter peeking
  const letter=new THREE.Mesh(new THREE.BoxGeometry(1.1*scale,.008*scale,.7*scale),new THREE.MeshStandardMaterial({color:0xffffff,roughness:.9}));
  letter.position.set(0,.44*scale,0);g.add(letter);
  // Gold emboss
  const vl=new THREE.Mesh(new THREE.BoxGeometry(.2*scale,.01*scale,.08*scale),goldMat);
  vl.position.set(0,.45*scale,0);g.add(vl);
  g.castShadow=true;
  return g;
}

// ============ FLOATING ENVELOPES ============
const floatingEnvelopes = [];
for(let i=0;i<12;i++){
  const env = makeEnvelope(.7+Math.random()*.3);
  env.position.set((Math.random()-.5)*12, 1.5+Math.random()*5, (Math.random()-.5)*10-2);
  env.rotation.set(Math.random()*.4-.2, Math.random()*Math.PI*2, Math.random()*.3-.15);
  env.userData = {
    idx: i,
    baseY: env.position.y,
    speed: .3+Math.random()*.5,
    phase: Math.random()*Math.PI*2,
    rotSpeed: (Math.random()-.5)*.3,
    driftX: (Math.random()-.5)*.005,
    clicked: false
  };
  scene.add(env);
  floatingEnvelopes.push(env);
}

// ============ CONVEYOR BELT ============
const conveyorGroup = new THREE.Group();
// Belt base
const belt = new THREE.Mesh(new THREE.BoxGeometry(10,.08,.8),darkMat);
belt.position.set(0,.3,-4);conveyorGroup.add(belt);
// Belt sides
const beltSide1 = new THREE.Mesh(new THREE.BoxGeometry(10,.15,.05),goldMat);
beltSide1.position.set(0,.35,-4.4);conveyorGroup.add(beltSide1);
const beltSide2 = new THREE.Mesh(new THREE.BoxGeometry(10,.15,.05),goldMat);
beltSide2.position.set(0,.35,-3.6);conveyorGroup.add(beltSide2);
// Rollers
for(let i=-4;i<=4;i++){
  const roller=new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,.9,12),darkMat);
  roller.rotation.x=Math.PI/2;roller.position.set(i,.28,-4);conveyorGroup.add(roller);
}
scene.add(conveyorGroup);

// Conveyor envelopes
const conveyorEnvs = [];
for(let i=0;i<6;i++){
  const env = makeEnvelope(.5);
  env.position.set(-6+i*2.2, .55, -4);
  env.rotation.y = Math.PI/2 + (Math.random()-.5)*.2;
  scene.add(env);
  conveyorEnvs.push(env);
}

// ============ MAIL SLOTS ============
const slotGroup = new THREE.Group();
for(let row=0;row<3;row++){
  for(let col=0;col<4;col++){
    const slot = new THREE.Mesh(new THREE.BoxGeometry(.9,.6,.5),velvetMat);
    slot.position.set(-2.7+col*1.1, 2+row*.7, -7);
    slotGroup.add(slot);
    // Gold label
    const label = new THREE.Mesh(new THREE.BoxGeometry(.4,.08,.01),goldMat);
    label.position.set(-2.7+col*1.1, 1.78+row*.7, -6.74);
    slotGroup.add(label);
  }
}
scene.add(slotGroup);

// ============ STAMP MACHINE ============
const stampMachine = new THREE.Group();
const smBase = new THREE.Mesh(new THREE.BoxGeometry(1,.6,1),darkMat);
smBase.position.set(5,.3,0);stampMachine.add(smBase);
const smTop = new THREE.Mesh(new THREE.CylinderGeometry(.3,.35,.4,16),darkMat);
smTop.position.set(5,.8,0);stampMachine.add(smTop);
const smArm = new THREE.Mesh(new THREE.BoxGeometry(.08,.8,.08),goldMat);
smArm.position.set(5,1.2,0);stampMachine.add(smArm);
const smStamp = new THREE.Mesh(new THREE.CylinderGeometry(.15,.15,.06,16),sealMat);
smStamp.position.set(5,1.6,0);stampMachine.add(smStamp);
scene.add(stampMachine);

// ============ HIDDEN STAMPS (clickable) ============
const hiddenStamps = [];
const stampPositions = [
  {x:-4, y:2.5, z:-3},
  {x:4.5, y:4, z:-5},
  {x:-1, y:.5, z:2},
  {x:3, y:1.5, z:-1},
  {x:-5, y:3.5, z:-6},
  {x:0, y:5.5, z:-4},
  {x:5, y:2, z:-6.5},
];
stampPositions.forEach((pos,i)=>{
  const s = new THREE.Mesh(new THREE.IcosahedronGeometry(.15,0), stampMat);
  s.position.set(pos.x,pos.y,pos.z);
  s.userData={isStamp:true, idx:i, collected:false};
  scene.add(s);
  hiddenStamps.push(s);
});

// ============ DECORATIVE ELEMENTS ============
// Floating wax seals
const floatingSeals = [];
for(let i=0;i<8;i++){
  const seal = new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,.03,24),sealMat.clone());
  seal.position.set((Math.random()-.5)*10, 2+Math.random()*4, (Math.random()-.5)*8-2);
  seal.rotation.x=Math.PI/2;
  seal.rotation.z=Math.random()*Math.PI;
  seal.userData={baseY:seal.position.y, phase:Math.random()*Math.PI*2, speed:.4+Math.random()*.4};
  scene.add(seal);
  floatingSeals.push(seal);
}

// Gold particle dust
const dustCount = 300;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(dustCount*3);
for(let i=0;i<dustCount;i++){
  dustPos[i*3]=(Math.random()-.5)*16;
  dustPos[i*3+1]=Math.random()*8;
  dustPos[i*3+2]=(Math.random()-.5)*14-2;
}
dustGeo.setAttribute('position',new THREE.BufferAttribute(dustPos,3));
scene.add(new THREE.Points(dustGeo,new THREE.PointsMaterial({color:0xc9a84c,size:.02,transparent:true,opacity:.4})));

// Torus knot (decorative chandelier)
const chandelier = new THREE.Mesh(
  new THREE.TorusKnotGeometry(.6,.15,100,12,3,4),
  new THREE.MeshStandardMaterial({color:0xc9a84c,roughness:.15,metalness:.9,emissive:0xc9a84c,emissiveIntensity:.03})
);
chandelier.position.set(0,6.5,-2);
scene.add(chandelier);

// Chain
const chain = new THREE.Mesh(new THREE.CylinderGeometry(.02,.02,2,8),goldMat);
chain.position.set(0,7.5,-2);scene.add(chain);

// Desk
const desk = new THREE.Mesh(new THREE.BoxGeometry(3,.1,1.5),new THREE.MeshStandardMaterial({color:0x2a1a0e,roughness:.5,metalness:.05}));
desk.position.set(-4,.8,1);desk.castShadow=true;scene.add(desk);
const deskLeg1=new THREE.Mesh(new THREE.BoxGeometry(.08,.8,.08),darkMat);deskLeg1.position.set(-5.3,.4,.5);scene.add(deskLeg1);
const deskLeg2=new THREE.Mesh(new THREE.BoxGeometry(.08,.8,.08),darkMat);deskLeg2.position.set(-2.7,.4,.5);scene.add(deskLeg2);
const deskLeg3=new THREE.Mesh(new THREE.BoxGeometry(.08,.8,.08),darkMat);deskLeg3.position.set(-5.3,.4,1.5);scene.add(deskLeg3);
const deskLeg4=new THREE.Mesh(new THREE.BoxGeometry(.08,.8,.08),darkMat);deskLeg4.position.set(-2.7,.4,1.5);scene.add(deskLeg4);
// Desk lamp
const lampBase=new THREE.Mesh(new THREE.CylinderGeometry(.1,.12,.03,16),goldMat);lampBase.position.set(-5,.86,1);scene.add(lampBase);
const lampArm=new THREE.Mesh(new THREE.CylinderGeometry(.015,.015,.8,8),goldMat);lampArm.position.set(-5,1.26,1);lampArm.rotation.z=.15;scene.add(lampArm);
const lampHead=new THREE.Mesh(new THREE.CylinderGeometry(.12,.06,.12,12),goldMat);lampHead.position.set(-4.88,1.66,1);scene.add(lampHead);
const lampGlow=new THREE.PointLight(0xffd700,.5,4);lampGlow.position.set(-4.88,1.5,1);scene.add(lampGlow);

// Desk envelope
const deskEnv = makeEnvelope(.6);
deskEnv.position.set(-4,.88,1);deskEnv.rotation.y=.3;scene.add(deskEnv);

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let MX=0,MY=0;

function getAllClickables(){
  const meshes=[];
  floatingEnvelopes.forEach(env=>{if(!env.userData.clicked)env.traverse(c=>{if(c.isMesh){c.userData._parent=env;meshes.push(c);}});});
  hiddenStamps.forEach(s=>{if(!s.userData.collected)meshes.push(s);});
  return meshes;
}

let hovering=false;
canvas.addEventListener('mousemove',e=>{
  MX=e.clientX;MY=e.clientY;
  pointer.x=(e.clientX/window.innerWidth)*2-1;
  pointer.y=-(e.clientY/window.innerHeight)*2+1;
  document.getElementById('cur').style.left=MX+'px';
  document.getElementById('cur').style.top=MY+'px';
  document.getElementById('curDot').style.left=MX+'px';
  document.getElementById('curDot').style.top=MY+'px';

  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(getAllClickables(),false);
  if(hits.length>0){
    if(!hovering){hovering=true;document.getElementById('cur').classList.add('hover');}
  }else{
    if(hovering){hovering=false;document.getElementById('cur').classList.remove('hover');}
  }
});

canvas.addEventListener('click',()=>{
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(getAllClickables(),false);
  if(hits.length>0){
    const obj=hits[0].object;
    // Check stamp
    if(obj.userData.isStamp && !obj.userData.collected){
      obj.userData.collected=true;
      collectStamp();
      // Burst animation
      obj.userData.burst=true;
      obj.userData.burstTime=0;
      return;
    }
    // Check envelope
    const parent=obj.userData._parent;
    if(parent && !parent.userData.clicked){
      parent.userData.clicked=true;
      parent.userData.openTime=0;
      openLetter(parent.userData.idx);
    }
  }
});

// ============ ANIMATION ============
function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*.001;

  // Camera subtle movement
  const targetX=(MX/window.innerWidth-.5)*3;
  const targetY=2+(MY/window.innerHeight-.5)*-1.5;
  camera.position.x+=(targetX-camera.position.x)*.02;
  camera.position.y+=(targetY-camera.position.y)*.02;
  camera.lookAt(0,2,-2);

  // Floating envelopes
  floatingEnvelopes.forEach(env=>{
    if(env.userData.clicked){
      // Fly away animation
      env.userData.openTime+=.016;
      const ot=env.userData.openTime;
      env.position.y+=.05;
      env.rotation.z+=.05;
      env.scale.setScalar(Math.max(0,1-ot));
      if(ot>1.2){
        // Respawn
        env.userData.clicked=false;
        env.position.set((Math.random()-.5)*12, 1.5+Math.random()*5, (Math.random()-.5)*10-2);
        env.rotation.set(Math.random()*.4-.2, Math.random()*Math.PI*2, Math.random()*.3-.15);
        env.scale.setScalar(1);
        env.userData.baseY=env.position.y;
      }
    }else{
      env.position.y=env.userData.baseY+Math.sin(t*env.userData.speed+env.userData.phase)*.3;
      env.rotation.y+=env.userData.rotSpeed*.01;
      env.position.x+=env.userData.driftX;
      if(env.position.x>7)env.position.x=-7;
      if(env.position.x<-7)env.position.x=7;
    }
  });

  // Conveyor
  conveyorEnvs.forEach(env=>{
    env.position.x+=.008;
    if(env.position.x>6){env.position.x=-6;env.rotation.y=Math.PI/2+(Math.random()-.5)*.2;}
  });

  // Floating seals
  floatingSeals.forEach(seal=>{
    seal.position.y=seal.userData.baseY+Math.sin(t*seal.userData.speed+seal.userData.phase)*.2;
    seal.rotation.z+=.005;
  });

  // Hidden stamps (spin + glow)
  hiddenStamps.forEach(s=>{
    if(s.userData.collected){
      if(s.userData.burst){
        s.userData.burstTime+=.03;
        s.scale.setScalar(1+s.userData.burstTime*2);
        s.material.opacity=Math.max(0,1-s.userData.burstTime);
        s.material.transparent=true;
        if(s.userData.burstTime>1)s.visible=false;
      }
    }else{
      s.rotation.x=t*2+s.userData.idx;
      s.rotation.y=t*1.5+s.userData.idx*.5;
      s.position.y+=Math.sin(t*1.5+s.userData.idx*2)*.001;
    }
  });

  // Dust drift
  const dp=dustGeo.attributes.position.array;
  for(let i=0;i<dustCount;i++){
    dp[i*3+1]+=.002;
    dp[i*3]+= Math.sin(t+i)*.0005;
    if(dp[i*3+1]>8){dp[i*3+1]=0;dp[i*3]=(Math.random()-.5)*16;}
  }
  dustGeo.attributes.position.needsUpdate=true;

  // Chandelier
  chandelier.rotation.y=t*.15;
  chandelier.rotation.x=Math.sin(t*.3)*.1;

  // Stamp machine arm bobbing
  stampMachine.children[2].position.y=1.2+Math.sin(t*2)*.08;
  stampMachine.children[3].position.y=1.6+Math.sin(t*2)*.08;

  // Lights
  goldLight.position.x=-2+Math.sin(t*.3)*1;
  goldLight.intensity=.7+Math.sin(t*.8)*.1;
  warmLight.intensity=.25+Math.sin(t*1.2)*.05;
  lampGlow.intensity=.4+Math.sin(t*3)*.05;

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// Hide instructions after a while
setTimeout(()=>{const i=document.getElementById('instr');i.style.transition='opacity 1s';i.style.opacity='0';},8000);
</script>
